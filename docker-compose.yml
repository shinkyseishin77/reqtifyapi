version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=mysql://root:rootpassword@db:3306/alternatifpostman
      - JWT_SECRET=supers3cr3t_p0stm4n_cl0n3
    depends_on:
      - db
    volumes:
      - ./src:/usr/src/app/src
      - ./public:/usr/src/app/public
    command: npm run dev

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: alternatifpostman
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
